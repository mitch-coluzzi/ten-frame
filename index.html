<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Ten-Frame</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header class="topbar">
      <h1>Ten-Frame</h1>
      <div class="controls">
        <button id="btn-reset" type="button">Reset</button>
        <button id="btn-toggle-number" type="button" aria-pressed="true">Show Number</button>
      </div>
    </header>

    <section class="stage">
      <div id="ten-frame" class="ten-frame" role="grid" aria-label="Ten frame"></div>
      <div id="number-display" class="number-display" aria-live="polite">0</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
